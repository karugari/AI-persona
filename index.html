<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot Start</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <header>
      <div class="header-content">
        <h1>AI Persona Chat</h1>
      </div>
    </header>
    <main id="chat-messages">
      <div class="message ai-message">
        はじめまして！キム・ギボムのAIアシスタントです。
        面接の前に、私のスキルや経験について何でも聞いてください！下のボタンから質問を選ぶこともできます。
      </div>
    </main>

    <footer>
      <div id="quick-buttons"></div>
      <div id="input-area">
        <input
          type="text"
          id="user-input"
          placeholder="メッセージを入力してください..."
        />
        <button id="send-btn">送信</button>
      </div>
    </footer>
  </body>
</html>
